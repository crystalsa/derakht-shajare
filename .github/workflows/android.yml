name: Android CI (Auto Build APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 9.3.1

    - name: Restore or Generate Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
        elif [ -f debug.keystore.base64.txt ]; then
          base64 -d debug.keystore.base64.txt > debug.keystore
        fi
        
        if [ ! -f debug.keystore ] || [ ! -s debug.keystore ]; then
          echo "Generating fallback debug.keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Configure Environment Variables
      run: cp .env.example .env

    - name: Configure Gradle Properties for GitHub Actions
      run: |
        sed -i 's/kotlin.compiler.execution.strategy=in-process/kotlin.compiler.execution.strategy=daemon/g' gradle.properties

    - name: Build Debug APK
      run: gradle :app:assembleDebug -Pkotlin.compiler.execution.strategy=daemon --no-configuration-cache

    - name: Prepare Renamed APK
      run: cp app/build/outputs/apk/debug/app-debug.apk "./شجره نامه.apk"

    - name: Upload Debug APK (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: shajareh-nameh-apk
        path: "./شجره نامه.apk"

    - name: Publish GitHub Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Determining next version tag..."
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Fetch tags
        git fetch --tags --force || true
        
        # Get the latest tag that fits our vX.XX format
        latest_tag=$(gh release list --limit 20 | awk '{print $1}' | grep -E '^v[0-9]+\.[0-9]+$' | head -n 1 || echo "")
        
        if [ -z "$latest_tag" ]; then
          latest_tag="v0.00"
        fi
        
        echo "Latest version tag found: $latest_tag"
        
        version_num=${latest_tag#v}
        major=$(echo "$version_num" | cut -d. -f1)
        minor=$(echo "$version_num" | cut -d. -f2)
        
        if ! [[ "$major" =~ ^[0-9]+$ ]] || ! [[ "$minor" =~ ^[0-9]+$ ]]; then
          major=0
          minor=0
        fi
        
        minor_clean=${minor#0}
        minor_clean=${minor_clean:-0}
        
        next_minor=$((minor_clean + 1))
        next_minor_formatted=$(printf "%02d" $next_minor)
        
        next_tag="v${major}.${next_minor_formatted}"
        echo "Next release tag will be: $next_tag"
        
        # Get last commit message as release notes
        commit_msg=$(git log -1 --pretty=%B | head -n 1)
        if [ -z "$commit_msg" ] || [[ "$commit_msg" == *"Merge"* ]]; then
          commit_msg="بهبود کارایی و رفع مشکلات عکس‌ها و گالری شجره‌نامه"
        fi

        # Create tag and release on GitHub
        git tag "$next_tag"
        git push origin "$next_tag"
        
        gh release create "$next_tag" "./شجره نامه.apk" \
          --title "شجره نامه - نسخه $next_tag" \
          --notes "$commit_msg"
