name: Android CI (Auto Build APK)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual triggering from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 9.3.1

    - name: Restore or Generate Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
        elif [ -f debug.keystore.base64.txt ]; then
          base64 -d debug.keystore.base64.txt > debug.keystore
        fi
        
        if [ ! -f debug.keystore ] || [ ! -s debug.keystore ]; then
          echo "Generating fallback debug.keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Configure Environment Variables
      run: cp .env.example .env

    - name: Configure Gradle Properties for GitHub Actions
      run: |
        sed -i 's/kotlin.compiler.execution.strategy=in-process/kotlin.compiler.execution.strategy=daemon/g' gradle.properties

    - name: Build Debug APK
      run: gradle :app:assembleDebug -Pkotlin.compiler.execution.strategy=daemon --no-configuration-cache

    - name: Upload Debug APK (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: app-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Publish GitHub Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        echo "Creating release tag..."
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # Delete existing 'latest' tag and release if present to update it
        gh release delete latest --yes || true
        git tag -d latest || true
        git push --delete origin latest || true
        
        # Create tag and release
        git tag latest
        git push origin latest
        gh release create latest app/build/outputs/apk/debug/app-debug.apk \
          --title "Latest Build" \
          --notes "This release contains the latest debug APK built automatically by GitHub Actions." \
          --prerelease
